<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-hidden="true">
  <title>Decorative radial diagram representing comprehensive urologic services</title>
  <!-- 7-spoke radial diagram, 51° between spokes -->
  <!-- Central hub -->
  <circle cx="140" cy="140" r="22" fill="none" stroke="#4BBFB8" stroke-width="2"/>
  <!-- Outer connecting ring (dashed) -->
  <circle cx="140" cy="140" r="108" fill="none" stroke="#1A6FA8" stroke-width="0.75" stroke-dasharray="5 5"/>
  <!-- Spokes and endpoint circles (7 spokes, ~51.4° apart) -->
  <!-- Spoke 0: 270° (top) -->
  <line x1="140" y1="118" x2="140" y2="34" stroke="#2E9BD6" stroke-width="1"/>
  <circle cx="140" cy="32" r="8" fill="#2E9BD6"/>
  <!-- Spoke 1: 321.4° -->
  <line x1="154" y1="124" x2="229" y2="66" stroke="#2E9BD6" stroke-width="1"/>
  <circle cx="232" cy="64" r="8" fill="#2E9BD6"/>
  <!-- Spoke 2: 12.8° -->
  <line x1="160" y1="140" x2="248" y2="162" stroke="#2E9BD6" stroke-width="1"/>
  <circle cx="250" cy="164" r="8" fill="#2E9BD6"/>
  <!-- Spoke 3: 64.2° -->
  <line x1="150" y1="158" x2="208" y2="240" stroke="#2E9BD6" stroke-width="1"/>
  <circle cx="210" cy="243" r="8" fill="#2E9BD6"/>
  <!-- Spoke 4: 115.6° -->
  <line x1="130" y1="158" x2="72" y2="240" stroke="#2E9BD6" stroke-width="1"/>
  <circle cx="70" cy="243" r="8" fill="#2E9BD6"/>
  <!-- Spoke 5: 167° -->
  <line x1="120" y1="140" x2="32" y2="162" stroke="#2E9BD6" stroke-width="1"/>
  <circle cx="30" cy="164" r="8" fill="#2E9BD6"/>
  <!-- Spoke 6: 218.4° -->
  <line x1="126" y1="124" x2="51" y2="66" stroke="#2E9BD6" stroke-width="1"/>
  <circle cx="48" cy="64" r="8" fill="#2E9BD6"/>
</svg>
