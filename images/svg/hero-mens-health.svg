<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img">
  <title>Anatomical illustration representing men's sexual and hormonal health with DNA, pulse, and molecular elements</title>
  <defs>
    <radialGradient id="mh-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2E9BD6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0B3D6B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mh-figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E9BD6"/>
      <stop offset="100%" stop-color="#0B3D6B"/>
    </linearGradient>
    <radialGradient id="mh-figure-hl" cx="40%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mh-helix-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4BBFB8"/>
      <stop offset="100%" stop-color="#2E9BD6"/>
    </linearGradient>
    <linearGradient id="mh-helix-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8C7430"/>
    </linearGradient>
    <radialGradient id="mh-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background field -->
  <circle cx="200" cy="200" r="190" fill="url(#mh-bg)"/>

  <!-- Stylized male torso silhouette (anatomically suggestive, simplified) -->
  <path d="M 200 90
           C 180 90, 170 100, 168 120
           L 165 135
           C 145 142, 130 152, 122 165
           L 116 180
           C 116 195, 122 205, 130 212
           L 138 218
           L 138 280
           C 138 300, 145 320, 154 332
           L 168 340
           L 168 360
           L 232 360
           L 232 340
           L 246 332
           C 255 320, 262 300, 262 280
           L 262 218
           L 270 212
           C 278 205, 284 195, 284 180
           L 278 165
           C 270 152, 255 142, 235 135
           L 232 120
           C 230 100, 220 90, 200 90 Z"
        fill="url(#mh-figure)" stroke="#0B3D6B" stroke-width="1.4"/>
  <!-- Torso highlight -->
  <path d="M 200 90
           C 180 90, 170 100, 168 120
           L 165 135
           C 145 142, 130 152, 122 165
           L 116 180
           C 116 195, 122 205, 130 212
           L 138 218
           L 138 280
           C 138 300, 145 320, 154 332
           L 168 340
           L 168 360
           L 232 360
           L 232 340
           L 246 332
           C 255 320, 262 300, 262 280
           L 262 218
           L 270 212
           C 278 205, 284 195, 284 180
           L 278 165
           C 270 152, 255 142, 235 135
           L 232 120
           C 230 100, 220 90, 200 90 Z"
        fill="url(#mh-figure-hl)"/>
  <!-- Center body line -->
  <line x1="200" y1="135" x2="200" y2="358" stroke="#0B3D6B" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Subtle pectoral indication -->
  <path d="M 168 195 Q 200 212, 232 195" fill="none" stroke="#0B3D6B" stroke-width="0.7" stroke-opacity="0.4"/>
  <!-- Subtle abdominal indication -->
  <path d="M 175 240 Q 200 245, 225 240" fill="none" stroke="#0B3D6B" stroke-width="0.6" stroke-opacity="0.3"/>
  <path d="M 178 270 Q 200 275, 222 270" fill="none" stroke="#0B3D6B" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Pulse / heartbeat waveform across the chest -->
  <path d="M 130 200 L 156 200 L 162 184 L 170 220 L 178 196 L 186 204 L 270 204"
        fill="none" stroke="#4BBFB8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pulse glow -->
  <circle cx="170" cy="220" r="5" fill="#4BBFB8" fill-opacity="0.4"/>

  <!-- Hormone glow (testosterone optimization indicator at lower abdomen) -->
  <circle cx="200" cy="295" r="32" fill="url(#mh-glow)"/>
  <circle cx="200" cy="295" r="6" fill="#C9A84C"/>
  <circle cx="200" cy="295" r="12" fill="none" stroke="#C9A84C" stroke-width="0.7" stroke-opacity="0.7"/>

  <!-- DNA double helix on the right side (representing genetic/hormonal optimization) -->
  <g transform="translate(320 100)">
    <!-- Helix strand A -->
    <path d="M 0 0
             C 14 12, 14 28, 0 40
             C -14 52, -14 68, 0 80
             C 14 92, 14 108, 0 120
             C -14 132, -14 148, 0 160
             C 14 172, 14 188, 0 200"
          fill="none" stroke="url(#mh-helix-a)" stroke-width="2" stroke-linecap="round"/>
    <!-- Helix strand B (mirror) -->
    <path d="M 0 0
             C -14 12, -14 28, 0 40
             C 14 52, 14 68, 0 80
             C -14 92, -14 108, 0 120
             C 14 132, 14 148, 0 160
             C -14 172, -14 188, 0 200"
          fill="none" stroke="url(#mh-helix-b)" stroke-width="2" stroke-linecap="round"/>
    <!-- Base pair rungs -->
    <line x1="-9" y1="20"  x2="9" y2="20"  stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.5"/>
    <line x1="-9" y1="60"  x2="9" y2="60"  stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.5"/>
    <line x1="-9" y1="100" x2="9" y2="100" stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.5"/>
    <line x1="-9" y1="140" x2="9" y2="140" stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.5"/>
    <line x1="-9" y1="180" x2="9" y2="180" stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.5"/>
    <!-- Base pair dots -->
    <circle cx="-9" cy="20"  r="2" fill="#4BBFB8"/>
    <circle cx="9"  cy="20"  r="2" fill="#C9A84C"/>
    <circle cx="-9" cy="60"  r="2" fill="#C9A84C"/>
    <circle cx="9"  cy="60"  r="2" fill="#4BBFB8"/>
    <circle cx="-9" cy="100" r="2" fill="#4BBFB8"/>
    <circle cx="9"  cy="100" r="2" fill="#C9A84C"/>
    <circle cx="-9" cy="140" r="2" fill="#C9A84C"/>
    <circle cx="9"  cy="140" r="2" fill="#4BBFB8"/>
    <circle cx="-9" cy="180" r="2" fill="#4BBFB8"/>
    <circle cx="9"  cy="180" r="2" fill="#C9A84C"/>
  </g>

  <!-- Testosterone molecule hexagons on the left side -->
  <g transform="translate(60 130)" stroke="#4BBFB8" stroke-width="1.2" fill="none">
    <polygon points="0,0 17,-10 34,0 34,20 17,30 0,20"/>
    <polygon points="34,0 51,-10 68,0 68,20 51,30 34,20"/>
    <polygon points="17,30 34,20 51,30 51,50 34,60 17,50"/>
    <!-- Methyl group dots -->
    <circle cx="68" cy="0" r="2" fill="#C9A84C"/>
    <circle cx="0" cy="20" r="2" fill="#C9A84C"/>
    <circle cx="34" cy="60" r="2" fill="#C9A84C"/>
  </g>

  <!-- Vitality starburst above figure -->
  <g stroke="#C9A84C" stroke-width="0.9" stroke-linecap="round">
    <line x1="200" y1="65" x2="200" y2="78"/>
    <line x1="186" y1="68" x2="190" y2="78"/>
    <line x1="214" y1="68" x2="210" y2="78"/>
    <line x1="174" y1="78" x2="183" y2="84"/>
    <line x1="226" y1="78" x2="217" y2="84"/>
  </g>
  <circle cx="200" cy="78" r="3" fill="#C9A84C"/>
</svg>
