<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img">
  <title>Anatomical illustration of urinary tract showing kidney stones, ureter, and bladder</title>
  <defs>
    <radialGradient id="ks-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A6FA8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0B3D6B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ks-kidney" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E9BD6"/>
      <stop offset="60%" stop-color="#1A6FA8"/>
      <stop offset="100%" stop-color="#0B3D6B"/>
    </linearGradient>
    <radialGradient id="ks-kidney-hl" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ks-pelvis" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4BBFB8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#2E9BD6" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="ks-stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7E5A8"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#6F5A24"/>
    </linearGradient>
    <linearGradient id="ks-bladder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4BBFB8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2E9BD6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="ks-laser" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="60%" stop-color="#C9A84C" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="ks-impact" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background field -->
  <circle cx="200" cy="200" r="190" fill="url(#ks-bg)"/>

  <!-- Left kidney (anatomically correct bean shape) -->
  <g transform="translate(120 130)">
    <!-- Kidney outer body -->
    <path d="M 0 0
             C -22 0, -36 18, -36 50
             C -36 80, -22 100, 0 100
             C 12 100, 16 92, 16 78
             C 16 64, 6 60, 6 50
             C 6 40, 16 36, 16 22
             C 16 8, 12 0, 0 0 Z"
          fill="url(#ks-kidney)" stroke="#0B3D6B" stroke-width="1.4"/>
    <!-- Kidney highlight -->
    <path d="M 0 0
             C -22 0, -36 18, -36 50
             C -36 80, -22 100, 0 100
             C 12 100, 16 92, 16 78
             C 16 64, 6 60, 6 50
             C 6 40, 16 36, 16 22
             C 16 8, 12 0, 0 0 Z"
          fill="url(#ks-kidney-hl)"/>
    <!-- Renal hilum (concave indentation detail) -->
    <ellipse cx="6" cy="50" rx="6" ry="14" fill="url(#ks-pelvis)" stroke="#0B3D6B" stroke-width="0.8"/>
    <!-- Subtle internal vasculature suggestion -->
    <path d="M -14 30 Q -8 50, -14 70" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.25"/>
    <path d="M -22 40 Q -16 50, -22 60" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.25"/>

    <!-- Kidney stones inside -->
    <!-- Large stone in renal pelvis -->
    <polygon points="-2,40 8,38 14,46 12,56 4,60 -4,56 -8,48"
             fill="url(#ks-stone)" stroke="#0B3D6B" stroke-width="0.9"/>
    <!-- Stone highlight -->
    <polygon points="-2,40 8,38 12,42 4,46" fill="#FFFFFF" fill-opacity="0.35"/>
    <!-- Small stone -->
    <polygon points="-18,68 -12,66 -8,72 -12,76 -18,74"
             fill="url(#ks-stone)" stroke="#0B3D6B" stroke-width="0.8"/>
    <!-- Tiny stone -->
    <polygon points="-26,52 -22,52 -22,56 -26,56" fill="url(#ks-stone)" stroke="#0B3D6B" stroke-width="0.5"/>
  </g>

  <!-- Right kidney (mirror) -->
  <g transform="translate(280 130) scale(-1 1)">
    <path d="M 0 0
             C -22 0, -36 18, -36 50
             C -36 80, -22 100, 0 100
             C 12 100, 16 92, 16 78
             C 16 64, 6 60, 6 50
             C 6 40, 16 36, 16 22
             C 16 8, 12 0, 0 0 Z"
          fill="url(#ks-kidney)" stroke="#0B3D6B" stroke-width="1.4"/>
    <path d="M 0 0
             C -22 0, -36 18, -36 50
             C -36 80, -22 100, 0 100
             C 12 100, 16 92, 16 78
             C 16 64, 6 60, 6 50
             C 6 40, 16 36, 16 22
             C 16 8, 12 0, 0 0 Z"
          fill="url(#ks-kidney-hl)"/>
    <ellipse cx="6" cy="50" rx="6" ry="14" fill="url(#ks-pelvis)" stroke="#0B3D6B" stroke-width="0.8"/>
    <path d="M -14 30 Q -8 50, -14 70" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.25"/>
    <path d="M -22 40 Q -16 50, -22 60" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.25"/>
    <!-- Stones in right kidney -->
    <polygon points="-4,46 4,42 10,48 8,58 0,62 -8,58 -10,52" fill="url(#ks-stone)" stroke="#0B3D6B" stroke-width="0.9"/>
    <polygon points="-4,46 4,42 8,46 0,50" fill="#FFFFFF" fill-opacity="0.35"/>
    <polygon points="-20,70 -14,68 -10,74 -14,78 -20,76" fill="url(#ks-stone)" stroke="#0B3D6B" stroke-width="0.8"/>
  </g>

  <!-- Left ureter (tube from kidney to bladder) -->
  <path d="M 126 230 Q 130 270, 158 310 Q 175 326, 188 332"
        fill="none" stroke="url(#ks-pelvis)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 126 230 Q 130 270, 158 310 Q 175 326, 188 332"
        fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Right ureter (mirror) -->
  <path d="M 274 230 Q 270 270, 242 310 Q 225 326, 212 332"
        fill="none" stroke="url(#ks-pelvis)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 274 230 Q 270 270, 242 310 Q 225 326, 212 332"
        fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Stone traveling down right ureter -->
  <polygon points="252,275 258,272 262,278 258,284 252,282" fill="url(#ks-stone)" stroke="#0B3D6B" stroke-width="0.7"/>

  <!-- Bladder at bottom -->
  <path d="M 152 332
           Q 150 326, 162 322
           L 238 322
           Q 250 326, 248 332
           L 252 360
           Q 252 380, 230 384
           L 170 384
           Q 148 380, 148 360 Z"
        fill="url(#ks-bladder)" stroke="#4BBFB8" stroke-width="1.4"/>
  <!-- Bladder highlight -->
  <ellipse cx="180" cy="345" rx="22" ry="6" fill="#FFFFFF" fill-opacity="0.22"/>

  <!-- Shockwave arcs targeting left kidney (extracorporeal lithotripsy) -->
  <g stroke="#4BBFB8" fill="none" stroke-linecap="round">
    <path d="M 26 100 Q 70 160, 26 220"  stroke-width="1.6" stroke-opacity="0.7"/>
    <path d="M 12 90  Q 56 160, 12 230"  stroke-width="1.4" stroke-opacity="0.5"/>
    <path d="M 0  78  Q 44 160, 0 244"   stroke-width="1.2" stroke-opacity="0.32"/>
    <path d="M -12 64 Q 32 160, -12 256" stroke-width="1" stroke-opacity="0.18"/>
  </g>

  <!-- Laser fiber entering right kidney via ureter (ureteroscopy) -->
  <line x1="395" y1="380" x2="280" y2="190" stroke="url(#ks-laser)" stroke-width="2" stroke-linecap="round"/>
  <!-- Laser focus point -->
  <circle cx="280" cy="190" r="5" fill="url(#ks-impact)"/>
  <circle cx="280" cy="190" r="2.5" fill="#FFFFFF"/>
  <!-- Fragmentation sparks at laser tip -->
  <g stroke="#C9A84C" stroke-width="0.7" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="280" y1="184" x2="284" y2="178"/>
    <line x1="284" y1="190" x2="290" y2="190"/>
    <line x1="280" y1="196" x2="284" y2="202"/>
    <line x1="276" y1="186" x2="272" y2="180"/>
    <line x1="276" y1="194" x2="272" y2="200"/>
  </g>

  <!-- Subtle dust/fragment particles near left kidney (post-shockwave) -->
  <g fill="#C9A84C" fill-opacity="0.7">
    <circle cx="92" cy="170" r="1.4"/>
    <circle cx="98" cy="190" r="1"/>
    <circle cx="86" cy="200" r="1.2"/>
    <circle cx="100" cy="215" r="0.9"/>
  </g>
</svg>
