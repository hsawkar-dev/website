<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img">
  <title>Abstract illustration of no-scalpel vasectomy procedure with minimal access point</title>
  <defs>
    <radialGradient id="vs-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A6FA8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0B3D6B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="200" cy="200" r="178" fill="url(#vs-glow)"/>
  <!-- Outer containment ring (dashed) -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.06" stroke-dasharray="8 6"/>

  <!-- Outer structural circle -->
  <circle cx="200" cy="200" r="145" fill="#0B3D6B" stroke="#1A6FA8" stroke-width="2"/>
  <!-- Inner small circle (access point) -->
  <circle cx="200" cy="200" r="44" fill="#4BBFB8" fill-opacity="0.18" stroke="#4BBFB8" stroke-width="1.5"/>

  <!-- Left vas deferens curve -->
  <path d="M55 320 C80 280, 110 250, 148 225 C170 211, 180 210, 188 208" fill="none" stroke="#2E9BD6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left vas terminus tick (severed) -->
  <line x1="184" y1="204" x2="192" y2="213" stroke="#2E9BD6" stroke-width="2" stroke-linecap="round"/>

  <!-- Right vas deferens curve -->
  <path d="M345 320 C320 280, 290 250, 252 225 C230 211, 220 210, 212 208" fill="none" stroke="#2E9BD6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right vas terminus tick (severed) -->
  <line x1="208" y1="204" x2="216" y2="213" stroke="#2E9BD6" stroke-width="2" stroke-linecap="round"/>

  <!-- Gap between the two ends highlighted -->
  <!-- Gold diamond seal at gap center -->
  <polygon points="200,200 207,208 200,216 193,208" fill="#C9A84C"/>

  <!-- Keyhole entry indicator at top of inner circle -->
  <circle cx="200" cy="160" r="8" fill="none" stroke="#4BBFB8" stroke-width="1.2" stroke-opacity="0.6"/>
  <rect x="196" y="168" width="8" height="12" rx="2" fill="none" stroke="#4BBFB8" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Subtle radiating lines from seal -->
  <line x1="200" y1="208" x2="200" y2="230" stroke="#C9A84C" stroke-width="0.75" stroke-opacity="0.4"/>
  <line x1="207" y1="208" x2="218" y2="222" stroke="#C9A84C" stroke-width="0.75" stroke-opacity="0.4"/>
  <line x1="193" y1="208" x2="182" y2="222" stroke="#C9A84C" stroke-width="0.75" stroke-opacity="0.4"/>
</svg>
