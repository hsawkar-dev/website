<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img">
  <title>Abstract illustration of Aquablation robotic waterjet therapy guided by ultrasound</title>
  <defs>
    <radialGradient id="aq-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A6FA8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0B3D6B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fine grid background (digital/robotic feel) -->
  <g stroke="#1A6FA8" stroke-width="0.5" stroke-opacity="0.08">
    <line x1="0" y1="20" x2="400" y2="20"/>
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="220" x2="400" y2="220"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="260" x2="400" y2="260"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="0" y1="340" x2="400" y2="340"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
    <line x1="0" y1="380" x2="400" y2="380"/>
    <line x1="20" y1="0" x2="20" y2="400"/>
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="60" y1="0" x2="60" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="140" y1="0" x2="140" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="180" y1="0" x2="180" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="220" y1="0" x2="220" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="260" y1="0" x2="260" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="340" y1="0" x2="340" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="380" y1="0" x2="380" y2="400"/>
  </g>

  <!-- Background glow -->
  <circle cx="200" cy="200" r="178" fill="url(#aq-glow)"/>

  <!-- Ultrasound arcs from top-center -->
  <path d="M200 30 Q320 120, 380 260" fill="none" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.7"/>
  <path d="M200 30 Q300 130, 340 280" fill="none" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.5"/>
  <path d="M200 30 Q270 130, 290 280" fill="none" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.35"/>
  <path d="M200 30 Q240 130, 240 275" fill="none" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.2"/>
  <path d="M200 30 Q80 120, 20 260" fill="none" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.7"/>
  <path d="M200 30 Q100 130, 60 280" fill="none" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.5"/>
  <path d="M200 30 Q130 130, 110 280" fill="none" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.35"/>
  <path d="M200 30 Q160 130, 160 275" fill="none" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Tissue region — elongated rounded rect -->
  <rect x="100" y="218" width="200" height="100" rx="20" fill="#0B3D6B" stroke="#1A6FA8" stroke-width="2"/>
  <!-- Inner volume highlight -->
  <rect x="116" y="230" width="168" height="76" rx="14" fill="#1A6FA8" fill-opacity="0.15"/>
  <!-- Gold dashed treatment boundary -->
  <rect x="106" y="224" width="188" height="88" rx="16" fill="none" stroke="#C9A84C" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Waterjet nozzle from right -->
  <rect x="320" y="255" width="55" height="18" rx="4" fill="#4BBFB8"/>
  <polygon points="320,255 305,263 320,273" fill="#4BBFB8"/>
  <!-- Jet line (tapers toward tissue) -->
  <line x1="305" y1="263" x2="292" y2="263" stroke="#4BBFB8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="292" y1="263" x2="285" y2="263" stroke="#4BBFB8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Spray dispersion lines -->
  <line x1="292" y1="263" x2="275" y2="255" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="292" y1="263" x2="275" y2="263" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="292" y1="263" x2="275" y2="271" stroke="#2E9BD6" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Robotic arm suggestion (upper right) -->
  <path d="M350 80 L330 110 L310 100" fill="none" stroke="#1A6FA8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="350" cy="80" r="5" fill="none" stroke="#1A6FA8" stroke-width="1.5"/>

  <!-- Gold crosshair reticle at jet contact point -->
  <circle cx="288" cy="263" r="10" fill="none" stroke="#C9A84C" stroke-width="1.2"/>
  <line x1="278" y1="263" x2="282" y2="263" stroke="#C9A84C" stroke-width="1.2"/>
  <line x1="294" y1="263" x2="298" y2="263" stroke="#C9A84C" stroke-width="1.2"/>
  <line x1="288" y1="253" x2="288" y2="257" stroke="#C9A84C" stroke-width="1.2"/>
  <line x1="288" y1="269" x2="288" y2="273" stroke="#C9A84C" stroke-width="1.2"/>
</svg>
