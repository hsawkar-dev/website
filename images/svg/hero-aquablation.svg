<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img">
  <title>Anatomical illustration of Aquablation robotic waterjet therapy with ultrasound guidance</title>
  <defs>
    <radialGradient id="aq-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A6FA8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0B3D6B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aq-bladder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4BBFB8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2E9BD6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="aq-prostate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E9BD6"/>
      <stop offset="60%" stop-color="#1A6FA8"/>
      <stop offset="100%" stop-color="#0B3D6B"/>
    </linearGradient>
    <radialGradient id="aq-prostate-hl" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aq-device" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D8D8D8"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#9A9A9A"/>
    </linearGradient>
    <linearGradient id="aq-jet" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#4BBFB8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4BBFB8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="aq-impact" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#4BBFB8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4BBFB8" stop-opacity="0"/>
    </radialGradient>
    <filter id="aq-soft">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Background field -->
  <circle cx="200" cy="200" r="190" fill="url(#aq-bg)"/>

  <!-- Ultrasound probe arcs (transrectal, coming from below the prostate) -->
  <g stroke="#2E9BD6" stroke-width="1.2" fill="none" stroke-opacity="0.55">
    <path d="M 90 380 Q 200 340, 310 380"/>
    <path d="M 100 360 Q 200 326, 300 360" stroke-opacity="0.45"/>
    <path d="M 115 340 Q 200 312, 285 340" stroke-opacity="0.35"/>
    <path d="M 130 320 Q 200 296, 270 320" stroke-opacity="0.25"/>
  </g>
  <!-- Ultrasound transducer head -->
  <ellipse cx="200" cy="385" rx="22" ry="6" fill="url(#aq-device)" stroke="#0B3D6B" stroke-width="0.8"/>

  <!-- Bladder -->
  <path d="M 140 70 Q 140 40, 200 40 Q 260 40, 260 70 L 258 122 Q 258 136, 244 140 L 156 140 Q 142 136, 142 122 Z"
        fill="url(#aq-bladder)" stroke="#4BBFB8" stroke-width="1.5" stroke-opacity="0.7"/>
  <ellipse cx="180" cy="70" rx="34" ry="14" fill="#FFFFFF" fill-opacity="0.22"/>

  <!-- Prostate -->
  <path d="M 200 140
           C 150 142, 118 175, 118 226
           C 118 274, 152 308, 200 314
           C 248 308, 282 274, 282 226
           C 282 175, 250 142, 200 140 Z"
        fill="url(#aq-prostate)" stroke="#0B3D6B" stroke-width="1.5"/>
  <path d="M 200 140
           C 150 142, 118 175, 118 226
           C 118 274, 152 308, 200 314
           C 248 308, 282 274, 282 226
           C 282 175, 250 142, 200 140 Z"
        fill="url(#aq-prostate-hl)"/>

  <!-- Treatment area (mapped resection zone) — gold dashed outline showing planned removal -->
  <path d="M 175 180
           C 156 184, 146 200, 144 226
           C 146 252, 156 268, 175 272
           C 200 274, 200 274, 200 274
           C 200 274, 200 274, 225 272
           C 244 268, 254 252, 256 226
           C 254 200, 244 184, 225 180
           C 200 178, 200 178, 200 178 Z"
        fill="#FFFFFF" fill-opacity="0.06" stroke="#C9A84C" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Urethra channel -->
  <rect x="195" y="138" width="10" height="186" rx="5" fill="#FFFFFF" fill-opacity="0.3"/>
  <line x1="200" y1="138" x2="200" y2="324" stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.85"/>

  <!-- AquaBeam handpiece (entering urethra from below) -->
  <rect x="192" y="280" width="16" height="60" rx="3" fill="url(#aq-device)" stroke="#0B3D6B" stroke-width="0.9"/>
  <!-- Body of handpiece -->
  <rect x="186" y="335" width="28" height="40" rx="4" fill="url(#aq-device)" stroke="#0B3D6B" stroke-width="0.9"/>
  <!-- Tech detail lines on handpiece -->
  <line x1="192" y1="346" x2="208" y2="346" stroke="#0B3D6B" stroke-width="0.5" stroke-opacity="0.7"/>
  <line x1="192" y1="354" x2="208" y2="354" stroke="#0B3D6B" stroke-width="0.5" stroke-opacity="0.7"/>
  <circle cx="200" cy="365" r="2" fill="#C9A84C"/>
  <!-- Robotic articulation joint glow -->
  <circle cx="200" cy="280" r="4" fill="#4BBFB8" fill-opacity="0.6"/>

  <!-- Saline waterjet stream — fan-shaped from device tip -->
  <g filter="url(#aq-soft)">
    <path d="M 200 226 L 168 196 L 162 200 L 162 252 L 168 256 Z" fill="url(#aq-jet)" fill-opacity="0.7" transform="translate(0 0)"/>
    <path d="M 200 226 L 232 196 L 238 200 L 238 252 L 232 256 Z" fill="url(#aq-jet)" fill-opacity="0.7" transform="scale(-1 1) translate(-400 0)"/>
  </g>
  <!-- High-velocity jet center lines -->
  <line x1="200" y1="226" x2="170" y2="200" stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.85" stroke-linecap="round"/>
  <line x1="200" y1="226" x2="166" y2="226" stroke="#FFFFFF" stroke-width="1.4" stroke-opacity="0.95" stroke-linecap="round"/>
  <line x1="200" y1="226" x2="170" y2="252" stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.85" stroke-linecap="round"/>
  <line x1="200" y1="226" x2="230" y2="200" stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.85" stroke-linecap="round"/>
  <line x1="200" y1="226" x2="234" y2="226" stroke="#FFFFFF" stroke-width="1.4" stroke-opacity="0.95" stroke-linecap="round"/>
  <line x1="200" y1="226" x2="230" y2="252" stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.85" stroke-linecap="round"/>

  <!-- Impact glow at jet termini -->
  <circle cx="166" cy="226" r="9" fill="url(#aq-impact)"/>
  <circle cx="234" cy="226" r="9" fill="url(#aq-impact)"/>

  <!-- Saline droplets dispersing -->
  <g fill="#FFFFFF" fill-opacity="0.7">
    <circle cx="156" cy="210" r="1"/>
    <circle cx="148" cy="220" r="1.2"/>
    <circle cx="152" cy="240" r="0.9"/>
    <circle cx="160" cy="248" r="1.1"/>
    <circle cx="244" cy="210" r="1"/>
    <circle cx="252" cy="220" r="1.2"/>
    <circle cx="248" cy="240" r="0.9"/>
    <circle cx="240" cy="248" r="1.1"/>
  </g>

  <!-- Crosshair targeting reticle (precision indicator) -->
  <g stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.7">
    <circle cx="200" cy="226" r="36" fill="none"/>
    <line x1="200" y1="186" x2="200" y2="194"/>
    <line x1="200" y1="258" x2="200" y2="266"/>
    <line x1="160" y1="226" x2="168" y2="226"/>
    <line x1="232" y1="226" x2="240" y2="226"/>
  </g>
</svg>
