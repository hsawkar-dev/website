<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img">
  <title>Anatomical illustration of Rezūm steam therapy injecting water vapor into prostate tissue</title>
  <defs>
    <radialGradient id="rz-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4BBFB8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0B3D6B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rz-bladder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4BBFB8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2E9BD6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="rz-prostate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E9BD6"/>
      <stop offset="60%" stop-color="#1A6FA8"/>
      <stop offset="100%" stop-color="#0B3D6B"/>
    </linearGradient>
    <radialGradient id="rz-prostate-hl" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rz-treatzone" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rz-device" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B8B8B8"/>
    </linearGradient>
    <filter id="rz-blur">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
    <filter id="rz-soft">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Background field -->
  <circle cx="200" cy="200" r="190" fill="url(#rz-bg)"/>

  <!-- Bladder -->
  <path d="M 140 80 Q 140 50, 200 50 Q 260 50, 260 80 L 258 132 Q 258 146, 244 150 L 156 150 Q 142 146, 142 132 Z"
        fill="url(#rz-bladder)" stroke="#4BBFB8" stroke-width="1.5" stroke-opacity="0.7"/>
  <ellipse cx="180" cy="80" rx="34" ry="14" fill="#FFFFFF" fill-opacity="0.22"/>

  <!-- Prostate -->
  <path d="M 200 150
           C 152 152, 122 182, 122 232
           C 122 280, 154 312, 200 318
           C 246 312, 278 280, 278 232
           C 278 182, 248 152, 200 150 Z"
        fill="url(#rz-prostate)" stroke="#0B3D6B" stroke-width="1.5"/>
  <path d="M 200 150
           C 152 152, 122 182, 122 232
           C 122 280, 154 312, 200 318
           C 246 312, 278 280, 278 232
           C 278 182, 248 152, 200 150 Z"
        fill="url(#rz-prostate-hl)"/>
  <line x1="200" y1="152" x2="200" y2="316" stroke="#0B3D6B" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Treatment zones — golden glow areas where steam is dispersing -->
  <g filter="url(#rz-soft)">
    <ellipse cx="158" cy="232" rx="32" ry="22" fill="url(#rz-treatzone)"/>
    <ellipse cx="242" cy="232" rx="32" ry="22" fill="url(#rz-treatzone)"/>
  </g>

  <!-- Urethra (open after treatment shrinks tissue) -->
  <rect x="195" y="148" width="10" height="180" rx="5" fill="#FFFFFF" fill-opacity="0.32"/>
  <line x1="200" y1="148" x2="200" y2="328" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.85"/>

  <!-- Delivery device (cystoscope/needle assembly entering urethra from below) -->
  <rect x="194" y="290" width="12" height="100" rx="3" fill="url(#rz-device)" stroke="#0B3D6B" stroke-width="0.8"/>
  <!-- Device shaft highlight -->
  <line x1="197" y1="290" x2="197" y2="386" stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.7"/>
  <!-- Needle extending laterally into prostate tissue (left side) -->
  <line x1="200" y1="232" x2="172" y2="232" stroke="#C9A84C" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="200" y1="232" x2="228" y2="232" stroke="#C9A84C" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Needle tips -->
  <circle cx="172" cy="232" r="2.2" fill="#C9A84C" stroke="#FFFFFF" stroke-width="0.5"/>
  <circle cx="228" cy="232" r="2.2" fill="#C9A84C" stroke="#FFFFFF" stroke-width="0.5"/>

  <!-- Steam vapor plumes radiating from injection points -->
  <g filter="url(#rz-blur)" fill="#FFFFFF">
    <!-- Left plume -->
    <ellipse cx="158" cy="220" rx="14" ry="9" fill-opacity="0.32"/>
    <ellipse cx="148" cy="232" rx="11" ry="7" fill-opacity="0.26"/>
    <ellipse cx="160" cy="245" rx="13" ry="8" fill-opacity="0.28"/>
    <ellipse cx="142" cy="218" rx="9" ry="6" fill-opacity="0.20"/>
    <ellipse cx="170" cy="246" rx="9" ry="6" fill-opacity="0.22"/>
    <!-- Right plume -->
    <ellipse cx="242" cy="220" rx="14" ry="9" fill-opacity="0.32"/>
    <ellipse cx="252" cy="232" rx="11" ry="7" fill-opacity="0.26"/>
    <ellipse cx="240" cy="245" rx="13" ry="8" fill-opacity="0.28"/>
    <ellipse cx="258" cy="218" rx="9" ry="6" fill-opacity="0.20"/>
    <ellipse cx="230" cy="246" rx="9" ry="6" fill-opacity="0.22"/>
  </g>

  <!-- Steam sparks (small radiating dashes) -->
  <g stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round" stroke-opacity="0.55">
    <line x1="158" y1="215" x2="155" y2="208"/>
    <line x1="148" y1="220" x2="142" y2="216"/>
    <line x1="170" y1="218" x2="174" y2="212"/>
    <line x1="155" y1="246" x2="150" y2="252"/>
    <line x1="166" y1="248" x2="170" y2="254"/>
    <line x1="242" y1="215" x2="245" y2="208"/>
    <line x1="252" y1="220" x2="258" y2="216"/>
    <line x1="230" y1="218" x2="226" y2="212"/>
    <line x1="245" y1="246" x2="250" y2="252"/>
    <line x1="234" y1="248" x2="230" y2="254"/>
  </g>

  <!-- Subtle dashed "previous size" outline (showing tissue reduction) -->
  <path d="M 200 132
           C 140 134, 104 172, 104 230
           C 104 284, 144 322, 200 332
           C 256 322, 296 284, 296 230
           C 296 172, 260 134, 200 132 Z"
        fill="none" stroke="#FFFFFF" stroke-width="0.6" stroke-opacity="0.25" stroke-dasharray="4 3"/>
</svg>
