<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-hidden="true">
  <title>Decorative medical credential emblem</title>
  <!-- Outer ring -->
  <circle cx="140" cy="140" r="132" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Middle dashed gold ring -->
  <circle cx="140" cy="140" r="118" fill="none" stroke="#C9A84C" stroke-width="0.75" stroke-dasharray="3 3"/>
  <!-- Inner filled circle -->
  <circle cx="140" cy="140" r="78" fill="#1A6FA8" fill-opacity="0.3"/>
  <!-- Medical cross -->
  <rect x="123" y="108" width="34" height="64" rx="4" fill="#FFFFFF" fill-opacity="0.6"/>
  <rect x="108" y="123" width="64" height="34" rx="4" fill="#FFFFFF" fill-opacity="0.6"/>
  <!-- 8 gold dots on outer ring -->
  <circle cx="140" cy="8"   r="3.5" fill="#C9A84C"/>
  <circle cx="233" cy="47"  r="3.5" fill="#C9A84C"/>
  <circle cx="272" cy="140" r="3.5" fill="#C9A84C"/>
  <circle cx="233" cy="233" r="3.5" fill="#C9A84C"/>
  <circle cx="140" cy="272" r="3.5" fill="#C9A84C"/>
  <circle cx="47"  cy="233" r="3.5" fill="#C9A84C"/>
  <circle cx="8"   cy="140" r="3.5" fill="#C9A84C"/>
  <circle cx="47"  cy="47"  r="3.5" fill="#C9A84C"/>
</svg>
