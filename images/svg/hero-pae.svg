<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img">
  <title>Anatomical illustration of prostatic artery embolization showing catheter and microspheres</title>
  <defs>
    <radialGradient id="pae-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A6FA8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0B3D6B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pae-bladder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4BBFB8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2E9BD6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="pae-prostate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E9BD6"/>
      <stop offset="60%" stop-color="#1A6FA8"/>
      <stop offset="100%" stop-color="#0B3D6B"/>
    </linearGradient>
    <radialGradient id="pae-prostate-hl" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pae-artery" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FF6B6B" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="pae-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Background field -->
  <circle cx="200" cy="200" r="190" fill="url(#pae-bg)"/>

  <!-- Bladder (above prostate) -->
  <path d="M 140 100 Q 140 70, 200 70 Q 260 70, 260 100 L 258 154 Q 258 168, 244 172 L 156 172 Q 142 168, 142 154 Z"
        fill="url(#pae-bladder)" stroke="#4BBFB8" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Bladder highlight -->
  <ellipse cx="180" cy="100" rx="34" ry="14" fill="#FFFFFF" fill-opacity="0.22"/>

  <!-- Prostate (chestnut/heart shape) -->
  <path d="M 200 172
           C 158 172, 132 195, 132 232
           C 132 268, 154 296, 200 304
           C 246 296, 268 268, 268 232
           C 268 195, 242 172, 200 172 Z"
        fill="url(#pae-prostate)" stroke="#0B3D6B" stroke-width="1.5"/>
  <!-- Prostate highlight (specular) -->
  <path d="M 200 172
           C 158 172, 132 195, 132 232
           C 132 268, 154 296, 200 304
           C 246 296, 268 268, 268 232
           C 268 195, 242 172, 200 172 Z"
        fill="url(#pae-prostate-hl)"/>
  <!-- Median sulcus (subtle center groove) -->
  <line x1="200" y1="174" x2="200" y2="302" stroke="#0B3D6B" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Urethra running through prostate (channel) -->
  <path d="M 200 145 Q 200 200, 200 305" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-opacity="0.4"/>
  <path d="M 200 145 Q 200 200, 200 305" fill="none" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.85"/>

  <!-- Right prostatic artery (entering from right) -->
  <path d="M 380 245 C 340 240, 310 235, 280 232 C 268 232, 268 232, 268 232" fill="none" stroke="url(#pae-artery)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Artery branches inside prostate -->
  <path d="M 268 232 C 250 230, 235 224, 224 218" fill="none" stroke="#FF6B6B" stroke-width="1.8" stroke-opacity="0.65" stroke-linecap="round"/>
  <path d="M 268 232 C 250 240, 240 250, 232 264" fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-opacity="0.55" stroke-linecap="round"/>
  <path d="M 268 232 C 256 232, 244 230, 236 230" fill="none" stroke="#FF6B6B" stroke-width="1.2" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Left prostatic artery (mirror) -->
  <path d="M 20 245 C 60 240, 90 235, 120 232 C 132 232, 132 232, 132 232" fill="none" stroke="url(#pae-artery)" stroke-width="3.5" stroke-linecap="round" transform="scale(-1 1) translate(-400 0)"/>
  <path d="M 132 232 C 150 230, 165 224, 176 218" fill="none" stroke="#FF6B6B" stroke-width="1.8" stroke-opacity="0.65" stroke-linecap="round"/>
  <path d="M 132 232 C 150 240, 160 250, 168 264" fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-opacity="0.55" stroke-linecap="round"/>
  <path d="M 132 232 C 144 232, 156 230, 164 230" fill="none" stroke="#FF6B6B" stroke-width="1.2" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Catheter — inserted into right prostatic artery -->
  <path d="M 395 280 C 360 268, 320 252, 280 240" fill="none" stroke="#C9A84C" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 395 280 C 360 268, 320 252, 280 240" fill="none" stroke="#FFFFFF" stroke-width="0.6" stroke-opacity="0.7" stroke-linecap="round"/>
  <!-- Catheter tip -->
  <circle cx="280" cy="240" r="3" fill="#C9A84C" stroke="#FFFFFF" stroke-width="0.8"/>

  <!-- Microspheres being released (gold particles flowing into branches) -->
  <g filter="url(#pae-soft)">
    <circle cx="270" cy="234" r="2.4" fill="#C9A84C"/>
    <circle cx="262" cy="230" r="2" fill="#C9A84C"/>
    <circle cx="255" cy="228" r="1.8" fill="#C9A84C" fill-opacity="0.85"/>
    <circle cx="248" cy="226" r="1.6" fill="#C9A84C" fill-opacity="0.75"/>
    <circle cx="244" cy="222" r="1.4" fill="#C9A84C" fill-opacity="0.7"/>
    <circle cx="252" cy="240" r="1.6" fill="#C9A84C" fill-opacity="0.75"/>
    <circle cx="244" cy="246" r="1.8" fill="#C9A84C" fill-opacity="0.7"/>
    <circle cx="238" cy="252" r="1.4" fill="#C9A84C" fill-opacity="0.65"/>
  </g>

  <!-- Gold halo around treatment zone -->
  <circle cx="268" cy="232" r="14" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.6"/>
  <circle cx="268" cy="232" r="22" fill="none" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.35"/>

  <!-- Anatomical label hint (subtle tick) -->
  <line x1="200" y1="148" x2="200" y2="142" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.5"/>
</svg>
